<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF"/>
      <stop offset="100%" style="stop-color:#DBEAFE"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="8" height="630" fill="#2563EB"/>
  <!-- Logo area -->
  <circle cx="600" cy="220" r="60" fill="#2563EB" opacity="0.1"/>
  <text x="600" y="234" font-family="system-ui,sans-serif" font-size="52" text-anchor="middle" fill="#2563EB">✈</text>
  <!-- Title -->
  <text x="600" y="320" font-family="system-ui,sans-serif" font-size="64" font-weight="800" text-anchor="middle" fill="#0F172A">Miles Optimizer</text>
  <!-- Subtitle -->
  <text x="600" y="385" font-family="system-ui,sans-serif" font-size="28" text-anchor="middle" fill="#475569">Optimisez vos miles et points voyage</text>
  <!-- Destinations -->
  <text x="600" y="450" font-family="system-ui,sans-serif" font-size="22" text-anchor="middle" fill="#94A3B8">DSS · CDG · JFK · LHR · DXB · MRS · MIA</text>
  <!-- Badge -->
  <rect x="460" y="490" width="280" height="44" rx="22" fill="#2563EB"/>
  <text x="600" y="518" font-family="system-ui,sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="white">Comparez 19 programmes</text>
</svg>
