services:
  # ── Service 1 : Version stable (main) ─────────────────────────
  - type: web
    name: miles-optimizer
    env: node
    branch: main
    region: frankfurt
    buildCommand: npm install --ignore-scripts && npm run build
    startCommand: node --experimental-strip-types server.js
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: SERPAPI_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: ANALYTICS_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false

  # ── Service 2 : Version next (nouvelle) ───────────────────────
  - type: web
    name: miles-optimizer-next
    env: node
    branch: next
    region: frankfurt
    buildCommand: npm install --ignore-scripts && npm run build
    startCommand: node --experimental-strip-types server.js
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: SERPAPI_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: ANALYTICS_SECRET
        sync: false
